{{ with .feed }} 
<div class="feed">
    <h3>{{- .name -}}</h3>
    <ul class='c-feed-list'>
            {{ range .list }}
            <li class='{{ index . "new" }}'><a href={{- .URL -}} aria-label="Read more"><h4>{{ .Title }}</h4><p>{{.Description}}</p></a></li>
            {{ end }}
    </ul>
</div>
{{ end }}
